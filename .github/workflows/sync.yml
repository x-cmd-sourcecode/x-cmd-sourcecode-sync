name: Sync Repos
on:
  workflow_dispatch:
  schedule:
    # Beijing 12:00  = UTC 04:00
    - cron: '0 4 * * *'
    # UTC 12:00       = Beijing 20:00
    - cron: '0 12 * * *'

jobs:
  SyncBot:
    runs-on: ubuntu-latest
    env:
      ssh_key: ${{ secrets.SSH_PRIVATE_KEY }}
      git_user: lijunhao
      git_email: l@x-cmd.com
      CONCURRENCY: 10
    steps:
      - name: main
        uses: x-cmd/action@main
        timeout-minutes: 8
        with:
          code: xws syncaction || exit
