name: Sync Repos
on:
  workflow_dispatch:
  schedule:
    # Beijing 12:00  = UTC 04:00
    - cron: '0 4 * * *'
    # UTC 12:00       = Beijing 20:00
    - cron: '0 12 * * *'

jobs:
  SyncBot:
    runs-on: ubuntu-latest
    env:
      ssh_key: ${{ secrets.SSH_PRIVATE_KEY }}
      git_user: lijunhao
      git_email: l@x-cmd.com
      CONCURRENCY: 10
    steps:
      - name: main
        uses: x-cmd/action@main
        timeout-minutes: 8
        with:
          # prehook: x-cmd-action's ___x_cmd_ghaction_init runs in a subshell,
          # so the ssh-agent env vars it sets are lost before the script runs.
          # We set up ~/.ssh/id_rsa ourselves in the prehook (same shell as
          # the script, so the file persists).
          prehook: |
            mkdir -p ~/.ssh
            printf '%s\n' "$ssh_key" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
            echo "--- ssh -T git@github.com ---"
            ssh -T -o ConnectTimeout=5 git@github.com 2>&1 | head -3
            echo "--- ssh test (specific repos) ---"
            GIT_SSH_COMMAND="ssh -v -o ConnectTimeout=5" git ls-remote git@github.com:x-cmd-sourcecode/sourcecode.git 2>&1 | grep -E "permission denied|authenticated|Hi |granted" | head -5
          script: .x-cmd/syncaction
